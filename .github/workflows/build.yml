name: Build desktop apps

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.name }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux
            os: ubuntu-22.04
            args: ""
          - name: macOS Intel
            os: macos-latest
            args: "--target x86_64-apple-darwin"
          - name: macOS Apple Silicon
            os: macos-latest
            args: "--target aarch64-apple-darwin"
          - name: Windows
            os: windows-latest
            args: ""

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ startsWith(matrix.name, 'macOS') && 'x86_64-apple-darwin,aarch64-apple-darwin' || '' }}

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install Tauri CLI
        uses: taiki-e/install-action@v2
        with:
          tool: tauri-cli@2

      - name: Build app
        uses: tauri-apps/tauri-action@action-v0.6.2
        with:
          projectPath: src-tauri
          tauriScript: cargo tauri
          args: ${{ matrix.args }}
          uploadWorkflowArtifacts: true
          workflowArtifactNamePattern: "[platform]-[arch]-[bundle]"
